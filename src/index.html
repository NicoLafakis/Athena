<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Athena</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #252525;
      --bg-input: #1e1e1e;
      --text-primary: #e5e5e5;
      --text-secondary: #999;
      --text-muted: #666;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --border: #2a2a2a;
      --user-bubble: #6366f1;
      --assistant-bubble: #1e1e1e;
      --tool-bg: #1a1a2e;
      --tool-border: #2a2a4a;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #22c55e;
      --code-bg: #111;
      --scrollbar-track: #1a1a1a;
      --scrollbar-thumb: #333;
    }

    html, body, #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    /* App Layout */
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-actions {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }

    .btn-clear:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* API Key Banner */
    .api-banner {
      background: #1a1a00;
      border-bottom: 1px solid #333300;
      padding: 12px 20px;
      font-size: 13px;
      color: #fbbf24;
      text-align: center;
    }

    .api-banner code {
      background: rgba(251, 191, 36, 0.15);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
    }

    /* Messages Area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-user {
      align-self: flex-end;
    }

    .message-assistant {
      align-self: flex-start;
    }

    .bubble {
      padding: 10px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble-user {
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble-assistant {
      background: var(--assistant-bubble);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Tool Cards */
    .tool-card {
      background: var(--tool-bg);
      border: 1px solid var(--tool-border);
      border-radius: 10px;
      margin: 6px 0;
      overflow: hidden;
      font-size: 13px;
      max-width: 80%;
      animation: fadeIn 0.2s ease-out;
    }

    .tool-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .tool-header:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .tool-name {
      font-weight: 600;
      color: var(--accent);
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
    }

    .tool-status {
      font-size: 11px;
      color: var(--text-muted);
    }

    .tool-status.running { color: #fbbf24; }
    .tool-status.completed { color: var(--success); }
    .tool-status.error { color: var(--danger); }
    .tool-status.cancelled { color: var(--text-muted); }

    .tool-body {
      border-top: 1px solid var(--tool-border);
      padding: 10px 14px;
      display: none;
    }

    .tool-body.open {
      display: block;
    }

    .tool-params, .tool-result {
      margin: 4px 0;
    }

    .tool-label {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .code-block {
      background: var(--code-bg);
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--text-primary);
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 200px;
      overflow-y: auto;
    }

    /* Thinking Indicator */
    .thinking {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      font-size: 14px;
      color: var(--text-secondary);
      animation: fadeIn 0.2s ease-out;
    }

    .thinking-dots {
      display: flex;
      gap: 4px;
    }

    .thinking-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: pulse 1.4s infinite ease-in-out;
    }

    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Input Area */
    .input-area {
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px 6px 6px 16px;
      transition: border-color 0.15s;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent);
    }

    .input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 6px 0;
    }

    .input-wrapper textarea::placeholder {
      color: var(--text-muted);
    }

    .btn-send {
      background: var(--accent);
      border: none;
      color: #fff;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-send:hover {
      background: var(--accent-hover);
    }

    .btn-send:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-send svg {
      width: 18px;
      height: 18px;
    }

    /* Confirmation Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.15s ease-out;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      max-width: 440px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .modal h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #fbbf24;
    }

    .modal .modal-tool {
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .modal .modal-message {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }

    .btn-cancel:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
    }

    .btn-confirm {
      background: var(--danger);
      border: none;
      color: #fff;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }

    .btn-confirm:hover {
      background: var(--danger-hover);
    }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .welcome p {
      font-size: 14px;
      text-align: center;
      max-width: 400px;
      line-height: 1.6;
    }

    .chevron {
      transition: transform 0.2s;
      color: var(--text-muted);
      font-size: 12px;
    }

    .chevron.open {
      transform: rotate(90deg);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./renderer.js"></script>
</body>
</html>
